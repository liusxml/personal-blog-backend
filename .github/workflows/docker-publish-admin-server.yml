# 工作流名称（在 GitHub Actions 页面显示的名称）
name: Build and Push Admin Server Image

# 触发条件：当代码被推送到 main 分支时，自动触发这个工作流
on:
  push:
    branches: [ "main" ]

# 工作流包含的任务（jobs）
jobs:
  build-and-push:
    # 指定运行环境：使用 GitHub 提供的免费 Ubuntu 云服务器
    runs-on: ubuntu-latest

    # 任务的具体步骤，按顺序执行
    steps:
      # 步骤 1：把仓库代码克隆到云服务器
      - name: Checkout
        uses: actions/checkout@v5

      # 步骤 2：登录到 Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 步骤 3：安装 Docker Buildx（高级构建工具）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 步骤 4：构建镜像并推送到 Docker Hub
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # 指定使用 Dockerfile.admin-server（非默认 Dockerfile）
          file: Dockerfile.admin-server
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/personal-blog-admin-server:latest
            ${{ vars.DOCKERHUB_USERNAME }}/personal-blog-admin-server:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
